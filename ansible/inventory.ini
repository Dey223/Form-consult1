# ============================================================
# inventory.ini — Liste des serveurs que Ansible va gérer
# ============================================================
# Ansible a besoin de savoir QUELS serveurs configurer.
# Ce fichier liste nos serveurs avec leurs paramètres de connexion.
#
# [formconsult] = le nom du groupe de serveurs
# On peut avoir plusieurs groupes : [production], [staging], etc.
# ============================================================

[formconsult]
35.181.50.81 ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/formconsult-key.pem ansible_ssh_common_args='-o StrictHostKeyChecking=no'

# Explication des paramètres :
# ansible_user              = l'utilisateur SSH sur le serveur (ec2-user sur Amazon Linux)
# ansible_ssh_private_key_file = chemin vers la clé privée SSH (.pem téléchargée depuis AWS)
# StrictHostKeyChecking=no  = ne pas bloquer la 1ère connexion (demande de confirmation fingerprint)
